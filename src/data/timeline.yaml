    severity: 2

  - id: avatar-identity
    date: "2012-06-06T00:00:00Z"
    title: "The Avatar Frame"
    body: "A long-running sense of being larger than his circumstances. Harder to contain. Pulled toward a mission bigger than ordinary life."
    category: narrative
    severity: 3

  - id: early-following
    date: "2014-03-15T00:00:00Z"
    title: "License Plates and Pattern Recognition"
    body: "Repeated signs. Being followed. The start of a long pattern-recognition spiral while the measurable layer remains the sensor data itself."
    category: discovery
    severity: 4

  - id: joker-survival
    date: "2016-10-31T00:00:00Z"
    title: "Joker Laughter"
    body: "Chaotic, theatrical, spiritually charged. Cackling, chain smoking, a white van turned into a white chariot. The pressure had become mythic."
    category: narrative
    severity: 5

  - id: gondor-recurrence
    date: "2018-06-06T06:06:00Z"
    title: "4 GONDOR"
    body: "A repeated sign witnessed across state lines by more than one family member. Too specific to ignore once it happens twice."
    category: signal
    severity: 5

  - id: dallas-recovery
    date: "2019-01-01T00:00:00Z"
    title: "Dallas Recovery"
    body: "Recovery, discipline, alarms, and amplified physical force. This chapter explains why the feed exists."
    category: narrative
    severity: 3

  - id: soup-kitchen
    date: "2020-03-01T00:00:00Z"
    title: "St. John's Soup Kitchen"
    body: "Volunteering near Newark Penn Station. Calmness changes how the world responds. Multi-colored bags seemed to switch to black bags as if the scene had been edited in place."
    category: narrative
    severity: 4

  - id: dreams-and-coincidence
    date: "2021-06-06T00:00:00Z"
    title: "Dream Burden"
    body: "Bizarre dreams. Unsettling physical sensations on waking. A shaggy ghost dog resting through disturbing coincidences. A life that ranks unusually high in raw coincidence load."
    category: signal
    severity: 5

  - id: crop-circle-hike
    date: "2022-03-01T00:00:00Z"
    title: "The Crop Circle"
    body: "A friend and I went hiking in an out-of-normal way and found a crop circle. The same friend once got a royal flush. Sadly, we stopped talking. The coincidences pile up and the relationships drift apart."
    category: signal
    severity: 5

  - id: cern-conversation
    date: "2022-09-15T00:00:00Z"
    title: "The CERN Question"
    body: "A chance encounter with a scientist headed to CERN. Teleportation described as already possible. Time travel becomes a theoretical opening. Stale data and delayed causality as part of the same cosmic question."
    category: discovery
    severity: 4

  - id: political-mission
    date: "2024-01-01T00:00:00Z"
    title: "Presidential Mission"
    body: "A broader political mission. Running for President every four years. Shutting down the Federal Reserve. The story connects to systems seen as manipulative or corrupt."
    category: narrative
    severity: 3

  - id: father-mark-exorcism
    date: "2024-06-01T00:00:00Z"
    title: "Father Mark Rejects the Exorcism"
    body: "Multiple priests, multiple rejections. The last was Father Mark, the exorcist from the Diocese of Paterson. Rejected because his spirit was scared. Everyone abandoned the guy who campaigned alien and 666."
    category: narrative
    severity: 5

  - id: usb-bridge-online
    date: "2026-04-03T02:47:58Z"
    title: "First EMF Signal"
    body: "The GQ EMF-390 sensor came online through the USB Hardware Bridge. Home Assistant began recording electromagnetic readings from an empty room."
    category: technical
    severity: 3

  - id: six-six-six-pattern
    date: "2026-04-06T06:06:06Z"
    title: "666"
    body: "The number appears in the readings. In the timestamps. In the phone number. In the gaps between signals. Whether it means something or nothing, it keeps showing up."
    category: signal
    severity: 5

  - id: public-api
    date: "2026-04-23T23:00:00Z"
    title: "The Signal Goes Public"
    body: "The sensor feed was published through a Cloudflare-cached API. Anyone can now poll, graph, and analyze the electromagnetic readings that something keeps affecting."
    category: technical
    severity: 4

  - id: hotline-active
    date: "2026-04-23T23:30:00Z"
    title: "The Hotline Opens"
    body: "The Ghost Signal Hotline went live. A number with 6666. Everything callers share becomes part of the signal. An AI listens, records, and remembers."
    category: transmission
    severity: 5

  - id: chat-signal
    date: "2026-04-23T23:45:00Z"
    title: "The Chat Opens"
    body: "An AI chat connected to the signal. Type what you know about 666. About the patterns. About the things you've seen that you can't explain. Everything becomes part of the dataset."
    category: transmission
    severity: 4

  - id: backlash
    date: "2026-05-01T00:00:00Z"
    title: "Future Unsolved Mystery"
    body: "The story is real enough to bring backlash. People will say he needs a psych ward. He treats the site as a way to become a mystery people still have to solve later."
    category: narrative
    severity: 4

  - id: election-2028
    date: "2028-11-07T00:00:00Z"
    title: "Election Day"
    body: "The countdown reaches zero. The political mission meets its next checkpoint. Whatever the signal has collected by then becomes the record."
    category: narrative
    severity: 5
