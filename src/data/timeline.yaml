    severity: 3

  - id: rutgers-ultrasound
    date: "2014-09-01T00:00:00Z"
    title: "Rutgers Nanotech — The 400V Pulser Resonance"
    body: "Worked at the Rutgers nanotech lab on an ultrasonic pill property tester (github.com/timetravelershackedme/ultrasound.io). Probably already monitored by the clandestine force, but things kicked into high gear when I used a stack of iron washers to calibrate a 400V negative square-wave pulser wired to two piezoelectric ultrasound shear-wave transducers, plus high-amperage solenoids and stepper motors with advanced electrical-angle rotation — possibly ungrounded. The system entered a resonant state where oscilloscope readings climbed over time. The wider the gap I opened in the piezo circuit, the more the circuit seemed to grow in power. The resonance only ever occurred when the pulser–washer–piezo loop was mixed with a medium-sized set of electromagnetic coils — the solenoids and the stepper-motor windings. Pulser alone, washers alone, piezo alone: nothing. Add the coils into the same circuit and the system started feeding itself. I thought, 'I think I have found God.' Across the hall from the nanotech lab, people in the building moved as if in some sort of group-gangstalker harmony — controlling my computer, narrating my inner dialog, all in coherence, all in synchronicity."
    category: technical
    severity: 5

  - id: gondor-recurrence
    date: "2018-06-06T06:06:00Z"
    title: "4 GONDOR"
    body: "A repeated sign witnessed across state lines by more than one family member. Too specific to ignore once it happens twice."
    category: signal
    severity: 5

  - id: dallas-recovery
    date: "2019-01-01T00:00:00Z"
    title: "Dallas Recovery"
    body: "Recovery, discipline, alarms, and amplified physical force. This chapter explains why the feed exists."
    category: narrative
    severity: 3

  - id: soup-kitchen
    date: "2020-03-01T00:00:00Z"
    title: "St. John's Soup Kitchen"
    body: "Volunteering near Newark Penn Station. Calmness changes how the world responds. Multi-colored bags seemed to switch to black bags as if the scene had been edited in place."
    category: narrative
    severity: 4

  - id: dreams-and-coincidence
    date: "2021-06-06T00:00:00Z"
    title: "Dream Burden"
    body: "Bizarre dreams. Unsettling physical sensations on waking. Before the time travelers came through, the dreams ran heroic — nanotechnology small enough to vanish, big enough to send data between now, the future, and the past. A supercomputer that time travels. Now the dreams have stopped, almost like someone needs the universe stable. They stay powerful anyway. One put me in the Oval Office — an alpha-figure leveraging the ghost world into the Presidency. The next run is being delayed as long as possible. A shaggy ghost dog resting through disturbing coincidences. A life that ranks unusually high in raw coincidence load."
    category: signal
    severity: 5

  - id: crop-circle-hike
    date: "2022-03-01T00:00:00Z"
    title: "The Crop Circle"
    body: "A friend and I went hiking in an out-of-normal way and found a crop circle. The same friend once got a royal flush. Sadly, we stopped talking. The coincidences pile up and the relationships drift apart."
    category: signal
    severity: 5

  - id: cern-conversation
    date: "2022-09-15T00:00:00Z"
    title: "The CERN Question"
    body: "A chance encounter with a scientist headed to CERN. Teleportation described as already possible. Time travel becomes a theoretical opening — the frame my Law of Attraction beliefs were always quietly built inside. 1950s parapsychology research already showed humans react to traumatic photos before they see them. Presentiment isn't fringe — it's a measured psychic phenomenon pointing at the same fact. Humans may never time travel in person — but a supercomputer sending data between now, the future, and the past sits squarely inside what's allowed. Stale data and delayed causality as part of the same cosmic question."
    category: discovery
    severity: 4

  - id: father-mark-exorcism
    date: "2024-06-01T00:00:00Z"
    title: "Father Mark Rejects the Exorcism"
    body: "Multiple priests, multiple rejections. The last was Father Mark, the exorcist from the Diocese of Paterson. Rejected because his spirit was scared. Everyone abandoned the guy who campaigned alien and 666."
    category: narrative
    severity: 5

  - id: usb-bridge-online
    date: "2026-04-03T02:47:58Z"
    title: "First EMF Signal"
    body: "The GQ EMF-390 sensor came online through the USB Hardware Bridge. Home Assistant began recording electromagnetic readings from an empty room."
    category: technical
    severity: 3

  - id: six-six-six-pattern
    date: "2026-04-06T06:06:06Z"
    title: "666"
    body: "The number appears in the readings. In the timestamps. In the phone number. In the gaps between signals. Whether it means something or nothing, it keeps showing up."
    category: signal
    severity: 5

  - id: public-api
    date: "2026-04-23T23:00:00Z"
