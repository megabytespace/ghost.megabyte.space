    body: "The sensor feed was published through a Cloudflare-cached API. Anyone can now poll, graph, and analyze the electromagnetic readings that something keeps affecting."
    category: technical
    severity: 4

  - id: hotline-active
    date: "2026-04-23T23:30:00Z"
